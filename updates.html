<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Notes — Archaeology Impossible Project</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=JetBrains+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    .entry-meta {
      border-bottom: 1px solid rgba(0,0,0,0.12);
      padding-bottom: 1.25rem;
      margin-bottom: 2rem;
    }
    .entry-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b6b6b;
      display: block;
      margin-bottom: 0.6rem;
    }
    .entry-title {
      font-family: 'Fraunces', 'Libre Baskerville', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      line-height: 1.15;
      margin: 0 0 0.9rem 0;
      color: #141414;
    }
    .entry-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #f3f2ed;
      color: #444;
      padding: 0.2rem 0.55rem;
      border-radius: 2px;
      border: 1px solid #e4e3dc;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- CV corner frame -->
    <div class="cv-frame" aria-hidden="true"></div>

    <!-- ── Metadata bar ── -->
    <header class="metadata">
      <div class="metadata-left">
        Graham &amp; Walsh<br>
        The Archaeology Impossible Project
      </div>
      <div class="metadata-right">
        <span>28°N 84°E · 5,364 m</span>
        <span id="epoch">—</span>
        <span style="margin-top:6px;display:block;">
          <a class="nav-link" href="index.html">← Home</a>
        </span>
      </div>
    </header>

    <!-- ── Dynamic content area ── -->
    <article id="content">
      <p class="loading">Retrieving field records…</p>
    </article>

    <!-- ── Footer ── -->
    <footer>
      <span>Graham &amp; Walsh 2026</span>
      <div class="footer-mark" aria-hidden="true"></div>
      <span>Field Notes</span>
    </footer>

  </div>

  <script>
    marked.setOptions({ gfm: true, breaks: true });

    // ── Epoch
    document.getElementById('epoch').textContent = new Date().toISOString().slice(0, 10);

    // ── Manifest schema (updates/manifest.json):
    // [
    //   { "slug": "2026-04-16-base-camp",
    //     "date": "2026-04-16",
    //     "title": "Base Camp Established",
    //     "tag": "Dispatch",
    //     "file": "updates/2026-04-16-base-camp.md" },
    //   …
    // ]

    const MANIFEST = 'updates/manifest.json';

    // ── Routing: hash = slug of entry, empty = list
    function getSlug() {
      return location.hash.replace(/^#/, '').trim() || '';
    }

    // ── Render the index list
    async function renderList(entries) {
      const contentEl = document.getElementById('content');

      // Sort newest-first
      const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));

      const listItems = sorted.map(e => `
        <li class="update-entry" data-slug="${e.slug}" role="link" tabindex="0"
            aria-label="${e.date}: ${e.title}">
          <span class="update-date">${formatDate(e.date)}</span>
          <span class="update-title">
            ${escapeHtml(e.title)}
            ${e.tag ? `<span class="update-tag">${escapeHtml(e.tag)}</span>` : ''}
          </span>
        </li>`).join('');

      contentEl.innerHTML = `
        <div class="page-section">
          <h2 style="margin-top:0;">Field Notes</h2>
          <ul class="updates-list">${listItems}</ul>
        </div>`;

      // Attach click + keyboard handlers
      contentEl.querySelectorAll('.update-entry').forEach(el => {
        const slug = el.dataset.slug;
        el.addEventListener('click', () => navigateTo(slug));
        el.addEventListener('keydown', ev => {
          if (ev.key === 'Enter' || ev.key === ' ') navigateTo(slug);
        });
      });
    }

    // ── Frontmatter helpers
    function splitFrontmatter(text) {
      const clean = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      if (!clean.startsWith('---\n')) return { data: {}, body: text };
      const end = clean.indexOf('\n---\n', 4);
      if (end === -1) return { data: {}, body: text };

      const block = clean.slice(4, end);
      const body  = clean.slice(end + 5);
      const data  = {};

      for (const line of block.split('\n')) {
        const idx = line.indexOf(':');
        if (idx === -1) continue;
        const key   = line.slice(0, idx).trim();
        let   value = line.slice(idx + 1).trim();
        // Strip surrounding quotes if present
        if ((value.startsWith('"') && value.endsWith('"')) ||
            (value.startsWith("'") && value.endsWith("'"))) {
          value = value.slice(1, -1);
        }
        data[key] = value;
      }
      return { data, body };
    }

    function parseTags(raw) {
      if (!raw) return [];
      let s = raw.trim();
      if (s.startsWith('[') && s.endsWith(']')) s = s.slice(1, -1);
      return s.split(',').map(t => t.trim().replace(/^['"]|['"]$/g, '')).filter(Boolean);
    }

    // ── Render a single update
    async function renderEntry(entry) {
      const contentEl = document.getElementById('content');
      contentEl.innerHTML = `<p class="loading">Loading ${entry.title}…</p>`;

      try {
        const res = await fetch(entry.file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();

        // Strip YAML frontmatter before Markdown parsing
        const { data, body } = splitFrontmatter(text);

        const title = data.title || entry.title;
        const date  = data.date  || entry.date;
        const tags  = parseTags(data.tags || entry.tag || '');

        const tagPills = tags.length
          ? `<div class="entry-tags">${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>`
          : '';

        contentEl.innerHTML = `
          <div class="page-section">
            <a class="back-link" id="back-btn">
              <span class="back-arrow">←</span> All field notes
            </a>
            <div class="entry-meta">
              <time class="entry-date">${formatDate(date)}</time>
              <h1 class="entry-title">${escapeHtml(title)}</h1>
              ${tagPills}
            </div>
            <div id="md-content">${marked.parse(body)}</div>
          </div>`;

        document.getElementById('back-btn').addEventListener('click', () => navigateTo(''));
      } catch (e) {
        contentEl.innerHTML =
          `<div class="error"><strong>Load error:</strong> ${e.message}</div>
           <a class="back-link" id="back-btn"><span class="back-arrow">←</span> Back</a>`;
        document.getElementById('back-btn').addEventListener('click', () => navigateTo(''));
      }
    }

    // ── Navigation
    function navigateTo(slug) {
      history.pushState(null, '', slug ? `#${slug}` : location.pathname);
      route();
    }

    // ── Main router
    let manifest = null;

    async function route() {
      const contentEl = document.getElementById('content');

      // Load manifest once
      if (!manifest) {
        try {
          const res = await fetch(MANIFEST);
          if (!res.ok) throw new Error(`Cannot load manifest (HTTP ${res.status})`);
          manifest = await res.json();
        } catch (e) {
          contentEl.innerHTML =
            `<div class="error"><strong>Manifest error:</strong> ${e.message}<br>
             Create <code>updates/manifest.json</code> — see inline comments for schema.</div>`;
          return;
        }
      }

      const slug = getSlug();

      if (!slug) {
        renderList(manifest);
        return;
      }

      const entry = manifest.find(e => e.slug === slug);
      if (!entry) {
        contentEl.innerHTML =
          `<div class="error">No field note found for slug <code>${escapeHtml(slug)}</code>.</div>
           <a class="back-link" id="back-btn"><span class="back-arrow">←</span> All notes</a>`;
        document.getElementById('back-btn').addEventListener('click', () => navigateTo(''));
        return;
      }

      renderEntry(entry);
    }

    // ── Helpers
    function formatDate(iso) {
      const [y, m, d] = iso.split('-');
      const months = ['Jan','Feb','Mar','Apr','May','Jun',
                      'Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${d} ${months[+m - 1]} ${y}`;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ── Listen for browser back/forward
    window.addEventListener('popstate', route);

    // ── Boot
    route();
  </script>
</body>
</html>
